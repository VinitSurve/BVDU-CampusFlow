<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your password - BVDU CampusFlow">
  <title>Forgot Password | BVDU CampusFlow</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">🔐</div>
          <h1 class="auth-title">Forgot Password?</h1>
          <p class="auth-subtitle">Enter your email to receive a reset link</p>
        </div>
        
        <div class="auth-body">
          <!-- Success message (hidden by default) -->
          <div id="success-message" class="hidden">
            <div class="alert alert-success mb-4">
              <div class="alert-icon">✓</div>
              <div class="alert-content">
                <div class="alert-title">Email Sent!</div>
                <p class="text-sm mb-0">Check your inbox for password reset instructions.</p>
              </div>
            </div>
            <a href="index.html" class="btn btn-primary w-full">Back to Login</a>
          </div>
          
          <!-- Form (shown by default) -->
          <form id="forgot-form" novalidate>
            <div class="form-group">
              <label for="email" class="form-label required">Email Address</label>
              <input 
                type="email" 
                id="email" 
                name="email" 
                class="form-control form-control-lg" 
                placeholder="Enter your registered email"
                autocomplete="email"
                required
              >
              <span class="form-error" id="email-error"></span>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-full mb-4" id="reset-btn">
              <span class="btn-text">Send Reset Link</span>
              <span class="btn-loading hidden">
                <span class="spinner spinner-sm"></span>
                Sending...
              </span>
            </button>
            
            <a href="index.html" class="btn btn-secondary w-full">
              ← Back to Login
            </a>
          </form>
        </div>
      </div>
      
      <p class="text-center text-xs text-muted mt-4">
        © 2026 BVDU CampusFlow. All rights reserved.
      </p>
    </div>
  </div>

  <script type="module">
    import { resetPassword, checkIfLoggedIn } from './js/auth.js';
    import { showError } from './js/notifications.js';
    
    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      checkIfLoggedIn();
    });
    
    // Form submission
    const forgotForm = document.getElementById('forgot-form');
    const resetBtn = document.getElementById('reset-btn');
    const successMessage = document.getElementById('success-message');
    
    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      clearErrors();
      
      const email = document.getElementById('email').value.trim();
      
      // Validate
      if (!email) {
        showFieldError('email', 'Email is required');
        return;
      }
      
      if (!isValidEmail(email)) {
        showFieldError('email', 'Please enter a valid email');
        return;
      }
      
      // Show loading
      setLoading(true);
      
      try {
        const result = await resetPassword(email);
        
        if (result.success) {
          // Hide form, show success message
          forgotForm.classList.add('hidden');
          successMessage.classList.remove('hidden');
        }
      } catch (error) {
        showError(error.message);
        setLoading(false);
      }
    });
    
    // Helper functions
    function isValidEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
    
    function showFieldError(fieldId, message) {
      const input = document.getElementById(fieldId);
      const error = document.getElementById(`${fieldId}-error`);
      
      input.classList.add('is-invalid');
      if (error) error.textContent = message;
    }
    
    function clearErrors() {
      const inputs = forgotForm.querySelectorAll('.form-control');
      const errors = forgotForm.querySelectorAll('.form-error');
      
      inputs.forEach(input => input.classList.remove('is-invalid'));
      errors.forEach(error => error.textContent = '');
    }
    
    function setLoading(loading) {
      const btnText = resetBtn.querySelector('.btn-text');
      const btnLoading = resetBtn.querySelector('.btn-loading');
      
      resetBtn.disabled = loading;
      
      if (loading) {
        btnText.classList.add('hidden');
        btnLoading.classList.remove('hidden');
      } else {
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
