<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | BVDU CampusFlow</title>
  
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <header class="header" id="header"></header>

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-content">
            <h1 class="page-title">My Profile</h1>
            <p class="page-subtitle">Manage your account information</p>
          </div>
        </div>

        <!-- Profile Content -->
        <div class="profile-layout">
          <!-- Profile Card -->
          <div class="card profile-card">
            <div class="profile-header">
              <div class="profile-avatar" id="profile-avatar">JS</div>
              <div class="profile-info">
                <h2 class="profile-name" id="profile-name">John Smith</h2>
                <p class="profile-role" id="profile-role">Student</p>
              </div>
            </div>
            <div class="profile-stats">
              <div class="profile-stat">
                <span class="profile-stat-value" id="stat-total">0</span>
                <span class="profile-stat-label">Total OD Forms</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-value" id="stat-approved">0</span>
                <span class="profile-stat-label">Approved</span>
              </div>
              <div class="profile-stat">
                <span class="profile-stat-value" id="stat-events">0</span>
                <span class="profile-stat-label">Events Attended</span>
              </div>
            </div>
          </div>

          <!-- Profile Details -->
          <div class="profile-details">
            <!-- Personal Information -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Personal Information</h3>
              </div>
              <div class="card-body">
                <dl class="profile-list">
                  <div class="profile-item">
                    <dt>Full Name</dt>
                    <dd id="info-name">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>Email Address</dt>
                    <dd id="info-email">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>Phone Number</dt>
                    <dd id="info-phone">-</dd>
                  </div>
                </dl>
              </div>
            </div>

            <!-- Academic Information -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Academic Information</h3>
              </div>
              <div class="card-body">
                <dl class="profile-list">
                  <div class="profile-item">
                    <dt>Roll Number</dt>
                    <dd id="info-roll">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>PRN</dt>
                    <dd id="info-prn">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>Course</dt>
                    <dd id="info-course">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>Year</dt>
                    <dd id="info-year">-</dd>
                  </div>
                  <div class="profile-item">
                    <dt>Division</dt>
                    <dd id="info-division">-</dd>
                  </div>
                </dl>
              </div>
            </div>

            <!-- Account Security -->
            <div class="card">
              <div class="card-header">
                <h3 class="card-title">Account Security</h3>
              </div>
              <div class="card-body">
                <form id="password-form" class="password-form">
                  <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-input" id="current-password" required>
                  </div>
                  <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="new-password" required minlength="6">
                    <span class="form-hint">Minimum 6 characters</span>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-input" id="confirm-password" required>
                  </div>
                  <button type="submit" class="btn btn-primary" id="change-password-btn">
                    Change Password
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { initApp, setPageTitle } from '/js/app.js';
    import { getCurrentUser, getUserInitials, formatRoleName, changePassword } from '/js/auth.js';
    import { getStudentODForms, getStudentEventParticipation } from '/js/db.js';
    import { showToast, showLoadingOverlay } from '/js/notifications.js';

    const user = initApp({ allowedRoles: ['student'] });
    
    if (user) {
      setPageTitle('My Profile');
      loadProfile();
      loadStats();
      setupPasswordForm();
    }

    function loadProfile() {
      // Profile card
      document.getElementById('profile-avatar').textContent = getUserInitials(user.full_name);
      document.getElementById('profile-name').textContent = user.full_name;
      document.getElementById('profile-role').textContent = formatRoleName(user.role);

      // Personal info
      document.getElementById('info-name').textContent = user.full_name;
      document.getElementById('info-email').textContent = user.email;
      document.getElementById('info-phone').textContent = user.phone || 'Not provided';

      // Academic info
      document.getElementById('info-roll').textContent = user.roll_number || '-';
      document.getElementById('info-prn').textContent = user.prn || '-';
      document.getElementById('info-course').textContent = user.course || '-';
      document.getElementById('info-year').textContent = user.year || '-';
      document.getElementById('info-division').textContent = user.division || '-';
    }

    async function loadStats() {
      try {
        const [forms, events] = await Promise.all([
          getStudentODForms(user.id),
          getStudentEventParticipation(user.id)
        ]);

        document.getElementById('stat-total').textContent = forms.length;
        document.getElementById('stat-approved').textContent = 
          forms.filter(f => f.status === 'hod_approved').length;
        document.getElementById('stat-events').textContent = events.length;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function setupPasswordForm() {
      const form = document.getElementById('password-form');
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const currentPassword = document.getElementById('current-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
          showToast('New passwords do not match', 'error');
          return;
        }

        if (newPassword.length < 6) {
          showToast('Password must be at least 6 characters', 'error');
          return;
        }

        const btn = document.getElementById('change-password-btn');
        btn.disabled = true;
        btn.textContent = 'Changing...';

        try {
          await changePassword(currentPassword, newPassword);
          showToast('Password changed successfully', 'success');
          form.reset();
        } catch (error) {
          console.error('Error changing password:', error);
          showToast(error.message || 'Failed to change password', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Change Password';
        }
      });
    }
  </script>

  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: var(--space-6);
      align-items: start;
    }

    @media (max-width: 991px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
    }

    .profile-card {
      text-align: center;
    }

    .profile-header {
      padding: var(--space-8) var(--space-6);
      border-bottom: 1px solid var(--gray-100);
    }

    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
      color: white;
      font-size: 32px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-4) auto;
    }

    .profile-name {
      font-size: var(--text-xl);
      font-weight: 600;
      margin: 0 0 var(--space-1) 0;
    }

    .profile-role {
      color: var(--gray-500);
      margin: 0;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
      padding: var(--space-6);
    }

    .profile-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-stat-value {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--primary-600);
    }

    .profile-stat-label {
      font-size: var(--text-xs);
      color: var(--gray-500);
      text-align: center;
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .profile-list {
      margin: 0;
    }

    .profile-item {
      display: flex;
      justify-content: space-between;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .profile-item:last-child {
      border-bottom: none;
    }

    .profile-item dt {
      color: var(--gray-500);
      font-size: var(--text-sm);
    }

    .profile-item dd {
      font-weight: 500;
      color: var(--gray-900);
      margin: 0;
    }

    .password-form {
      max-width: 400px;
    }
  </style>
</body>
</html>
