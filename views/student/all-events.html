<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Events | BVDU CampusFlow</title>
  
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <header class="header" id="header"></header>

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-content">
            <h1 class="page-title">All Events</h1>
            <p class="page-subtitle">Discover upcoming events and register for OD</p>
          </div>
        </div>

        <!-- Filters -->
        <div class="card mb-6">
          <div class="card-body">
            <div class="filters-row">
              <div class="form-group">
                <label class="form-label">Event Type</label>
                <select class="form-select" id="filter-type">
                  <option value="">All Types</option>
                  <option value="workshop">Workshop</option>
                  <option value="seminar">Seminar</option>
                  <option value="hackathon">Hackathon</option>
                  <option value="competition">Competition</option>
                  <option value="cultural">Cultural</option>
                  <option value="sports">Sports</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-select" id="filter-status">
                  <option value="">All Status</option>
                  <option value="upcoming">Upcoming</option>
                  <option value="ongoing">Ongoing</option>
                  <option value="completed">Completed</option>
                </select>
              </div>
              <div class="form-group flex-grow">
                <label class="form-label">Search</label>
                <input type="text" class="form-input" id="filter-search" placeholder="Search events...">
              </div>
            </div>
          </div>
        </div>

        <!-- View Toggle -->
        <div class="view-toggle mb-4">
          <button class="view-btn active" id="grid-view-btn" title="Grid View">▦</button>
          <button class="view-btn" id="list-view-btn" title="List View">☰</button>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="events-container">
          <div class="loading-spinner mx-auto"></div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display: none;">
          <div class="empty-state-icon">📅</div>
          <h3 class="empty-state-title">No Events Found</h3>
          <p class="empty-state-text">There are no events matching your criteria.</p>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { initApp, setPageTitle } from '/js/app.js';
    import { getAllEvents } from '/js/db.js';
    import { formatDate, debounce } from '/js/utils.js';
    import { showToast } from '/js/notifications.js';

    const user = initApp({ allowedRoles: ['student'] });
    
    if (user) {
      setPageTitle('All Events');
      loadEvents();
      setupFilters();
      setupViewToggle();
    }

    let allEvents = [];
    let filteredEvents = [];
    let isGridView = true;

    async function loadEvents() {
      try {
        allEvents = await getAllEvents();
        applyFilters();
      } catch (error) {
        console.error('Error loading events:', error);
        showToast('Error loading events', 'error');
      }
    }

    function setupFilters() {
      const typeFilter = document.getElementById('filter-type');
      const statusFilter = document.getElementById('filter-status');
      const searchFilter = document.getElementById('filter-search');

      typeFilter.addEventListener('change', applyFilters);
      statusFilter.addEventListener('change', applyFilters);
      searchFilter.addEventListener('input', debounce(applyFilters, 300));
    }

    function setupViewToggle() {
      const gridBtn = document.getElementById('grid-view-btn');
      const listBtn = document.getElementById('list-view-btn');

      gridBtn.addEventListener('click', () => {
        isGridView = true;
        gridBtn.classList.add('active');
        listBtn.classList.remove('active');
        renderEvents();
      });

      listBtn.addEventListener('click', () => {
        isGridView = false;
        listBtn.classList.add('active');
        gridBtn.classList.remove('active');
        renderEvents();
      });
    }

    function applyFilters() {
      const type = document.getElementById('filter-type').value;
      const status = document.getElementById('filter-status').value;
      const search = document.getElementById('filter-search').value.toLowerCase();

      const now = new Date();

      filteredEvents = allEvents.filter(event => {
        // Type filter
        if (type && event.event_type !== type) return false;

        // Status filter
        if (status) {
          const startDate = new Date(event.start_date);
          const endDate = new Date(event.end_date);
          
          if (status === 'upcoming' && startDate <= now) return false;
          if (status === 'ongoing' && (startDate > now || endDate < now)) return false;
          if (status === 'completed' && endDate >= now) return false;
        }

        // Search filter
        if (search && !event.event_name.toLowerCase().includes(search) && 
            !event.description?.toLowerCase().includes(search)) return false;

        return true;
      });

      renderEvents();
    }

    function renderEvents() {
      const container = document.getElementById('events-container');
      const emptyState = document.getElementById('empty-state');

      if (filteredEvents.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.className = isGridView ? 'events-grid' : 'events-list';

      container.innerHTML = filteredEvents.map(event => {
        const now = new Date();
        const startDate = new Date(event.start_date);
        const endDate = new Date(event.end_date);
        
        let statusBadge = '';
        if (endDate < now) {
          statusBadge = '<span class="badge badge-secondary">Completed</span>';
        } else if (startDate <= now && endDate >= now) {
          statusBadge = '<span class="badge badge-success">Ongoing</span>';
        } else {
          statusBadge = '<span class="badge badge-primary">Upcoming</span>';
        }

        if (isGridView) {
          return `
            <div class="event-card">
              <div class="event-card-header">
                <div class="event-date-badge">
                  <span class="event-date-day">${startDate.getDate()}</span>
                  <span class="event-date-month">${startDate.toLocaleDateString('en-US', { month: 'short' })}</span>
                </div>
                ${statusBadge}
              </div>
              <div class="event-card-body">
                <span class="event-type-badge">${event.event_type || 'Event'}</span>
                <h3 class="event-title">${event.event_name}</h3>
                <p class="event-description">${event.description?.substring(0, 100) || 'No description'}${event.description?.length > 100 ? '...' : ''}</p>
                <div class="event-meta">
                  <span class="event-meta-item">📍 ${event.venue || 'TBA'}</span>
                  <span class="event-meta-item">🏢 ${event.club_name || 'College'}</span>
                </div>
              </div>
              <div class="event-card-footer">
                <a href="/views/student/event-details.html?id=${event.id}" class="btn btn-primary btn-sm btn-block">
                  View Details
                </a>
              </div>
            </div>
          `;
        } else {
          return `
            <div class="event-list-item">
              <div class="event-list-date">
                <span class="event-date-day">${startDate.getDate()}</span>
                <span class="event-date-month">${startDate.toLocaleDateString('en-US', { month: 'short' })}</span>
              </div>
              <div class="event-list-content">
                <div class="event-list-header">
                  <h3 class="event-title">${event.event_name}</h3>
                  <div class="event-badges">
                    <span class="event-type-badge">${event.event_type || 'Event'}</span>
                    ${statusBadge}
                  </div>
                </div>
                <div class="event-meta">
                  <span class="event-meta-item">📍 ${event.venue || 'TBA'}</span>
                  <span class="event-meta-item">📅 ${formatDate(event.start_date)} - ${formatDate(event.end_date)}</span>
                  <span class="event-meta-item">🏢 ${event.club_name || 'College'}</span>
                </div>
              </div>
              <div class="event-list-action">
                <a href="/views/student/event-details.html?id=${event.id}" class="btn btn-outline btn-sm">
                  View →
                </a>
              </div>
            </div>
          `;
        }
      }).join('');
    }
  </script>

  <style>
    .filters-row {
      display: flex;
      gap: var(--space-4);
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .filters-row .form-group {
      min-width: 150px;
      margin-bottom: 0;
    }

    .filters-row .flex-grow {
      flex: 1;
      min-width: 200px;
    }

    .view-toggle {
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
    }

    .view-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--gray-300);
      background: white;
      border-radius: var(--radius-md);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .view-btn:hover {
      background: var(--gray-50);
    }

    .view-btn.active {
      background: var(--primary-50);
      border-color: var(--primary-400);
      color: var(--primary-600);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-6);
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .event-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .event-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .event-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: var(--space-4);
      background: var(--gray-50);
    }

    .event-date-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .event-date-day {
      font-size: var(--text-xl);
      font-weight: 700;
      line-height: 1;
      color: var(--primary-600);
    }

    .event-date-month {
      font-size: var(--text-xs);
      text-transform: uppercase;
      font-weight: 500;
      color: var(--gray-500);
    }

    .event-card-body {
      padding: var(--space-4);
    }

    .event-type-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      background: var(--gray-100);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--gray-600);
      text-transform: capitalize;
      margin-bottom: var(--space-2);
    }

    .event-title {
      font-size: var(--text-lg);
      font-weight: 600;
      margin: 0 0 var(--space-2) 0;
      color: var(--gray-900);
    }

    .event-description {
      font-size: var(--text-sm);
      color: var(--gray-600);
      margin: 0 0 var(--space-4) 0;
      line-height: 1.5;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .event-meta-item {
      font-size: var(--text-sm);
      color: var(--gray-500);
    }

    .event-card-footer {
      padding: var(--space-4);
      border-top: 1px solid var(--gray-100);
    }

    .btn-block {
      width: 100%;
    }

    /* List View */
    .event-list-item {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      transition: all 0.15s ease;
    }

    .event-list-item:hover {
      box-shadow: var(--shadow-md);
    }

    .event-list-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: var(--primary-50);
      border-radius: var(--radius-lg);
      flex-shrink: 0;
    }

    .event-list-content {
      flex: 1;
      min-width: 0;
    }

    .event-list-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .event-badges {
      display: flex;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .event-list-action {
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: var(--space-12);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: var(--space-4);
    }

    .empty-state-title {
      font-weight: 600;
      margin: 0 0 var(--space-2) 0;
    }

    .empty-state-text {
      color: var(--gray-500);
      margin: 0;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary-600);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 767px) {
      .event-list-item {
        flex-direction: column;
        align-items: stretch;
      }

      .event-list-date {
        width: 100%;
        flex-direction: row;
        gap: var(--space-2);
        height: auto;
        padding: var(--space-3);
      }

      .event-list-header {
        flex-direction: column;
      }

      .event-badges {
        order: -1;
      }
    }
  </style>
</body>
</html>
