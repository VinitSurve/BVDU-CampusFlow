<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OD Forms | BVDU CampusFlow</title>
  
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-wrapper">
      <header class="header" id="header"></header>

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div class="page-header-content">
            <h1 class="page-title">OD Forms</h1>
            <p class="page-subtitle">Review and approve OD requests for your subjects</p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs mb-6">
          <button class="tab-btn active" data-tab="pending">
            Pending <span class="tab-badge" id="pending-count">0</span>
          </button>
          <button class="tab-btn" data-tab="approved">
            Approved <span class="tab-badge" id="approved-count">0</span>
          </button>
          <button class="tab-btn" data-tab="rejected">
            Rejected <span class="tab-badge" id="rejected-count">0</span>
          </button>
        </div>

        <!-- Forms Table -->
        <div class="card">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table" id="forms-table">
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Event</th>
                    <th>Subject</th>
                    <th>OD Period</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="forms-tbody">
                  <tr>
                    <td colspan="6" class="text-center py-8">
                      <div class="loading-spinner mx-auto"></div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display: none;">
          <div class="empty-state-icon">📋</div>
          <h3 class="empty-state-title">No OD Forms</h3>
          <p class="empty-state-text" id="empty-text">No OD forms in this category.</p>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { initApp, setPageTitle } from '/js/app.js';
    import { getFacultyODForms } from '/js/db.js';
    import { formatDate, getStatusBadgeHTML, getRelativeTime } from '/js/utils.js';
    import { showToast } from '/js/notifications.js';

    const user = initApp({ allowedRoles: ['faculty'] });
    
    if (user) {
      setPageTitle('OD Forms');
      loadForms();
      setupTabs();
    }

    let allForms = [];
    let currentTab = 'pending';

    async function loadForms() {
      try {
        allForms = await getFacultyODForms(user.id);
        updateCounts();
        renderTable();
      } catch (error) {
        console.error('Error loading forms:', error);
        showToast('Error loading OD forms', 'error');
      }
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          renderTable();
        });
      });
    }

    function updateCounts() {
      document.getElementById('pending-count').textContent = 
        allForms.filter(f => f.status === 'pending').length;
      document.getElementById('approved-count').textContent = 
        allForms.filter(f => f.status === 'approved').length;
      document.getElementById('rejected-count').textContent = 
        allForms.filter(f => f.status === 'rejected').length;
    }

    function renderTable() {
      const tbody = document.getElementById('forms-tbody');
      const emptyState = document.getElementById('empty-state');
      const table = document.getElementById('forms-table');

      const filteredForms = allForms.filter(f => f.status === currentTab);

      if (filteredForms.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      table.style.display = 'table';
      emptyState.style.display = 'none';

      tbody.innerHTML = filteredForms.map(form => `
        <tr>
          <td>
            <div class="table-cell-main">${form.student_name}</div>
            <div class="table-cell-sub">${form.student_roll_number} • ${form.student_course}</div>
          </td>
          <td>${form.event_name}</td>
          <td>${form.subject_name}</td>
          <td>
            <div class="table-cell-main">${formatDate(form.od_start_date)}</div>
            <div class="table-cell-sub">to ${formatDate(form.od_end_date)}</div>
          </td>
          <td>${getStatusBadgeHTML(form.status)}</td>
          <td>
            <a href="/views/faculty/review-form.html?id=${form.od_form_id}&subject=${form.subject_id}" 
               class="btn btn-sm ${currentTab === 'pending' ? 'btn-primary' : 'btn-outline'}">
              ${currentTab === 'pending' ? 'Review' : 'View'}
            </a>
          </td>
        </tr>
      `).join('');
    }
  </script>

  <style>
    .tabs {
      display: flex;
      gap: var(--space-2);
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: var(--space-4);
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: none;
      border: none;
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all 0.15s ease;
    }

    .tab-btn:hover {
      background: var(--gray-100);
    }

    .tab-btn.active {
      background: var(--primary-50);
      color: var(--primary-700);
    }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 var(--space-1);
      background: var(--gray-200);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
    }

    .tab-btn.active .tab-badge {
      background: var(--primary-100);
    }

    .table-cell-main {
      font-weight: 500;
      color: var(--gray-900);
    }

    .table-cell-sub {
      font-size: var(--text-sm);
      color: var(--gray-500);
    }

    .empty-state {
      text-align: center;
      padding: var(--space-12);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: var(--space-4);
    }

    .empty-state-title {
      font-weight: 600;
      margin: 0 0 var(--space-2) 0;
    }

    .empty-state-text {
      color: var(--gray-500);
      margin: 0;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary-600);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
